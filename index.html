<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Matematika Berantai (Chain Math)</title>
    <!-- Menghubungkan file CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Chain Math</h1>
    <p id="instruction">Hitung penjumlahan dan pengurangan di dalam kepala Anda!</p>
    
    <div id="settings-area" class="settings">
        <div class="setting-group">
            <label for="step-count">Jumlah Angka:</label>
            <input type="number" id="step-count" value="5" min="2" max="50">
        </div>
        <div class="setting-group">
            <label for="digit-slider">Maksimal Digit:</label>
            <div class="slider-container">
                <input type="range" id="digit-slider" min="1" max="5" value="1">
                <span id="digit-display" class="slider-value">1</span>
            </div>
        </div>
        <div class="setting-group">
            <label for="speed-slider">Kecepatan:</label>
            <div class="slider-container">
                <input type="range" id="speed-slider" min="0.5" max="3.0" step="0.1" value="1.5">
                <span id="speed-display" class="slider-value">1.5s</span>
            </div>
        </div>
    </div>
    
    <div id="display-area">Siap?</div>
    
    <button id="start-btn" onclick="startChain()">START</button>
    <!-- Tambahkan tombol toggle di bawahnya -->
    <button id="theme-toggle" onclick="toggleTheme()">🌙 Dark Mode</button>

    <div id="answer-area">
        <form id="answer-form" onsubmit="checkAnswer(event)">
            <input type="number" id="user-answer" placeholder="Hasil akhir..." required autocomplete="off"><br>
            <button type="submit">Jawab</button>
        </form>
    </div>
    
    <div id="feedback"></div>
</div>

<!-- Menghubungkan file JavaScript -->
<script src="script.js"></script>
</body>
</html>
